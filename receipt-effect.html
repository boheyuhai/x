  <title>NEOBREATH Receipt Effect</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;

    }
    #app {
      position: fixed;
      inset: 0;
    }
    .panel {
      display: none;
      pointer-events: none;
      position: fixed;
      left: 20px;
      top: 20px;
      max-width: 360px;
      border-radius: 18px;
      border: 1px solid rgba(160,170,185,.24);
      background: rgba(255,255,255,.58);
      padding: 16px;
      box-shadow: 0 24px 80px rgba(120,130,150,.18);
      backdrop-filter: blur(14px);
      z-index: 10;
    }
    .title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .34em;
      color: rgba(30,41,59,.82);
    }
    .desc {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.65;
      color: rgba(71,85,105,.76);
    }
    .hint {
      display: none;
      pointer-events: none;
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      border-radius: 999px;
      border: 1px solid rgba(160,170,185,.24);
      background: rgba(255,255,255,.62);
      padding: 8px 16px;
      font-size: 12px;
      color: rgba(71,85,105,.72);
      backdrop-filter: blur(14px);

<body>
  <div id="app"></div>
  <div class="panel">
    <div class="title">ZRECEIPT UI</div>
    <div class="desc">
      榧犳爣鍦ㄥ皬绁ㄤ笂鏃朵繚鐣欏眬閮ㄦ竻鏅板害鎺㈢収鐏紝鑳屾櫙娓愰粦锛涢紶鏍囩寮€灏忕エ鍚庯紝鑳屾櫙鍥炵櫧锛屽皬绁ㄦ暣浣撳彉娓呮櫚锛岄粦瀛楀拰绾稿紶杈圭紭瀵规瘮澧炲己銆?
    </div>
  </div>
  <div class="hint">Scroll to move receipt upward 路 Mouse move to reveal clarity</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const host = document.getElementById("app");
    let width = host.clientWidth || window.innerWidth;
    let height = host.clientHeight || window.innerHeight;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xf3f4f6, 5.2, 14);

    const camera = new THREE.PerspectiveCamera(38, width / height, 0.01, 100);
    camera.position.set(0, 0.05, 5.25);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(DPR);
    renderer.setSize(width, height);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearColor(0x000000, 0);
    host.appendChild(renderer.domElement);

    const receiptGroup = new THREE.Group();
    scene.add(receiptGroup);

    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const topLight = new THREE.DirectionalLight(0xffffff, 1.05);
    topLight.position.set(-2.2, 4.2, 4);
    scene.add(topLight);

    const rimLight = new THREE.PointLight(0xdde8f4, 0.86, 7.2);
    rimLight.position.set(2.7, -1.1, 3.2);
    scene.add(rimLight);

    const cursorLight = new THREE.PointLight(0xffffff, 0, 4.6);
    cursorLight.position.set(0, 0, 1.6);
    scene.add(cursorLight);

    const bgGeometry = new THREE.PlaneGeometry(22, 14, 1, 1);
    const bgMaterial = new THREE.ShaderMaterial({
      transparent: false,
      depthWrite: false,
      uniforms: {
        uTime: { value: 0 },
        uSpot: { value: new THREE.Vector2(0.5, 0.5) },
        uAspect: { value: width / height },
        uHover: { value: 0 },
        uOnReceipt: { value: 0 },
      },
      vertexShader: `
        varying vec2 vUv;
        void main(){
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform vec2 uSpot;
        uniform float uAspect;
        uniform float uHover;
        uniform float uOnReceipt;
        float noise(vec2 p){
          return fract(sin(dot(p, vec2(41.13, 289.7))) * 45812.31);
        }
        void main(){
          float grain = (noise(vUv * vec2(980.0, 620.0) + uTime * 0.04) - 0.5) * 0.010;

          vec2 q = vUv - uSpot;
          float breathe = sin(uTime * 1.55 + q.x * 20.0) * 0.018 + sin(uTime * 1.12 + q.y * 27.0) * 0.012;
          float fluid = (noise((vUv + vec2(sin(uTime * 0.20), cos(uTime * 0.16))) * 7.5) - 0.5) * 0.050;
          // Keep the background spotlight circular in screen space.
          vec2 circleQ = vec2(q.x * uAspect, q.y);

          float d = length(circleQ);
          float clarity = 1.0 - smoothstep(0.060, 0.440, d + fluid * 0.014);
          float edge = 1.0 - smoothstep(0.160, 0.700, d + breathe * 0.12);

          vec3 whiteScene = vec3(0.965, 0.970, 0.978);
          vec3 blackScene = vec3(0.020, 0.022, 0.026);
          vec3 dim = vec3(0.52, 0.54, 0.58);
          vec3 clear = vec3(0.992, 0.994, 0.998);

          float on = uOnReceipt;
          vec3 base = mix(whiteScene, blackScene, on);
          vec3 color = mix(base, dim, (1.0 - edge) * 0.20 * uHover * on);
          color = mix(color, clear, clarity * 0.16 * uHover * on);
          color += grain * mix(0.55, 1.0, on);
          gl_FragColor = vec4(color, 1.0);
        }
      `,
    });
    const bg = new THREE.Mesh(bgGeometry, bgMaterial);
    bg.position.z = -4.3;
    scene.add(bg);

    const cols = 64;
    const rows = 360;
    const paperW = 2.1200;
    const paperH = paperW * 7.0038;
    const dx = paperW / (cols - 1);
    const dy = paperH / (rows - 1);
    const particles = [];
    const constraints = [];

    class Particle {
      constructor(x, y, z, u, v, row, col) {
        this.pos = new THREE.Vector3(x, y, z);
        this.prev = this.pos.clone();
        this.acc = new THREE.Vector3();
        this.base = new THREE.Vector3(x, y, z);
        this.u = u;
        this.v = v;
        this.row = row;
        this.col = col;
        this.invMass = (row === 0 || row >= rows - 4) ? 0 : 1;
        this.crease = 0.0;
        this.creaseTarget = 0.0;
      }
      addForce(f) {
        if (this.invMass > 0) this.acc.addScaledVector(f, this.invMass);
      }
      integrate(dtSq, damping) {
        if (this.invMass === 0) {
          this.prev.copy(this.pos);
          this.pos.copy(this.base);
          return;
        }
        const velocity = this.pos.clone().sub(this.prev).multiplyScalar(damping);
        this.prev.copy(this.pos);
        this.pos.add(velocity).addScaledVector(this.acc, dtSq);
        this.acc.set(0, 0, 0);
      }
    }

    const get = (r, c) => particles[r * cols + c];
    const addConstraint = (a, b, dist, stiffness = 1) => constraints.push({ a, b, dist, stiffness });
    const smoothstep = (edge0, edge1, x) => {
      const t = THREE.MathUtils.clamp((x - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    };

    for (let r = 0; r < rows; r++) {
      const v = r / (rows - 1);
      for (let c = 0; c < cols; c++) {
        const u = c / (cols - 1);
        const x = (u - 0.5) * paperW;
        const y = (0.5 - v) * paperH;
        const z = Math.sin(v * Math.PI) * 0.025;
        particles.push(new Particle(x, y, z, u, v, r, c));
      }
    }

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (c < cols - 1) addConstraint(get(r, c), get(r, c + 1), dx, 1.0);       // horizontal: very stiff, paper resists stretching across width
        if (r < rows - 1) addConstraint(get(r, c), get(r + 1, c), dy, 0.94);       // vertical: firmer, less cloth-like sag
        if (c < cols - 2) addConstraint(get(r, c), get(r, c + 2), dx * 2, 0.88);   // horizontal bend resistance
        if (r < rows - 2) addConstraint(get(r, c), get(r + 2, c), dy * 2, 0.70);   // vertical bend resistance
        if (c < cols - 1 && r < rows - 1) {
          addConstraint(get(r, c), get(r + 1, c + 1), Math.sqrt(dx * dx + dy * dy), 0.62);
          addConstraint(get(r + 1, c), get(r, c + 1), Math.sqrt(dx * dx + dy * dy), 0.62);
        }
      }
    }

    const geo = new THREE.BufferGeometry();
    const vertices = new Float32Array(rows * cols * 3);
    const uvs = new Float32Array(rows * cols * 2);
    const indices = [];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const p = get(r, c);
        const i = r * cols + c;
        vertices[i * 3] = p.pos.x;
        vertices[i * 3 + 1] = p.pos.y;
        vertices[i * 3 + 2] = p.pos.z;
        uvs[i * 2] = p.u;
        uvs[i * 2 + 1] = 1 - p.v;
      }
    }
    for (let r = 0; r < rows - 1; r++) {
      for (let c = 0; c < cols - 1; c++) {
        const i = r * cols + c;
        indices.push(i, i + cols, i + 1, i + 1, i + cols, i + cols + 1);
      }
    }
    geo.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
    geo.setAttribute("uv", new THREE.BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();

        void main(){
          vec4 tex = texture2D(uMap, vUv);
          float fiberA = sin((vUv.y * 890.0) + sin(vUv.x * 31.0) * 2.0) * 0.5 + 0.5;
          float fiberB = hash(floor(vUv * vec2(230.0, 840.0))) * 0.8;
          float edge = smoothstep(0.0, 0.045, vUv.x) * smoothstep(1.0, 0.955, vUv.x) * smoothstep(0.0, 0.025, vUv.y) * smoothstep(1.0, 0.975, vUv.y);
          vec2 q = vUv - uMouseUv;
          float breathe = sin(uTime * 1.75 + q.x * 25.0) * 0.016 + sin(uTime * 1.08 + q.y * 31.0) * 0.012;
          float fluid = (hash(floor((vUv + uTime * 0.012) * 26.0)) - 0.5) * 0.020;
          // Aspect-correct the receipt UVs so the clarity spotlight is a true circle on the tall paper.
          // Without this, equal UV radii become a vertically stretched ellipse because the paper is much taller than it is wide.
          vec2 circleQ = vec2(q.x, q.y * uPaperAspect);
          float d = length(circleQ);
          float core = (1.0 - smoothstep(0.00, 0.095, d)) * uHover;
          float clarity = (1.0 - smoothstep(0.060, 0.430, d + fluid * 0.45)) * uHover;
          float feather = (1.0 - smoothstep(0.155, 0.720, d + breathe * 0.09)) * uHover;

          vec2 blurDir = normalize(circleQ + vec2(0.001, -0.002));
          float blurAmount = (1.0 - clarity) * uHover;
          vec2 off1 = blurDir * 0.0048 * blurAmount;
          vec2 off2 = vec2(-blurDir.y, blurDir.x) * 0.0032 * blurAmount;
          vec4 blurred = (
            texture2D(uMap, vUv) * 0.38 +
            texture2D(uMap, vUv + off1) * 0.17 +
            texture2D(uMap, vUv - off1) * 0.17 +
            texture2D(uMap, vUv + off2) * 0.14 +
            texture2D(uMap, vUv - off2) * 0.14
          );
          tex = mix(blurred, tex, max(clarity, 0.08));

          float offReceipt = 1.0 - uOnReceipt;
          float globalClear = offReceipt * 0.92;
          float contrast = mix(0.53, 2.18, max(core * 1.45, clarity));
          contrast = mix(contrast, 1.82, globalClear);
          float brightness = mix(0.74, 1.12, max(core*1.1, feather));
          brightness = mix(brightness, 1.10, globalClear);
          float fresnel = pow(1.0 - abs(dot(normalize(vNormal), vec3(0.0,0.0,1.0))), 1.45);
          float edgeThickness = 1.0 - edge;

          vec3 warm = tex.rgb + vec3(0.006, 0.006, 0.010) * fiberA + vec3(fiberB * 0.004);
          warm = (warm - 0.5) * mix(1.04, 1.18, max(core, clarity)) + 0.5;
          warm = mix(warm, vec3(1.0), core * 0.035);
          warm += fresnel * vec3(0.030, 0.034, 0.038);
          warm -= edgeThickness * vec3(0.018, 0.020, 0.022);
          warm *= mix(0.98, 1.04, max(core, feather));

          float softCleanEdge = smoothstep(0.0, 0.038, vUv.x) * smoothstep(1.0, 0.962, vUv.x) * smoothstep(0.0, 0.026, vUv.y) * smoothstep(1.0, 0.974, vUv.y);
          float sharpEdge = mix(edge, softCleanEdge, globalClear * 0.55);
          float alpha = (0.88 + tex.a * 0.10) * sharpEdge * uOpacity;
          alpha += clarity * 0.025 + fresnel * 0.010;
          gl_FragColor = vec4(warm, alpha);
        }
      `,
    });

    const paper = new THREE.Mesh(geo, paperMaterial);
    receiptGroup.add(paper);

    const backMaterial = paperMaterial.clone();
    backMaterial.uniforms = THREE.UniformsUtils.clone(paperMaterial.uniforms);
    backMaterial.uniforms.uOpacity.value = 0.14;
    const paperBack = new THREE.Mesh(geo, backMaterial);
    paperBack.position.z = -0.045;
    paperBack.scale.set(1.006, 1.003, 1);
    receiptGroup.add(paperBack);

    const glowGeo = new THREE.CircleGeometry(1.42, 192);
    const glowMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: { uAlpha: { value: 0 } },
      vertexShader: `
        varying vec2 vUv;
        void main(){
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uAlpha;
        void main(){
          vec2 q = vUv - vec2(0.5);
          float d = length(q);
          float feather = smoothstep(0.68, 0.04, d) * smoothstep(0.01, 0.48, d);
          float a = feather * 0.035;
          gl_FragColor = vec4(0.78, 0.80, 0.84, a * uAlpha);
        }
      `,
    });
    const glow = new THREE.Mesh(glowGeo, glowMaterial);
    glow.position.z = 1.15;
    scene.add(glow);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(0, 0);
    const targetUv = new THREE.Vector2(0.5, 0.35);
    const smoothUv = new THREE.Vector2(0.5, 0.35);
    const liftPoint = new THREE.Vector3(0, 0, 0.9);
    const targetLift = new THREE.Vector3(0, 0, 0.9);
    let isHovering = false;
    let isDown = false;
    let hoverAmount = 0;
    let onReceiptAmount = 0;
    let scrollImpulse = 0;
    let scrollOffset = 0;
    const scrollStart = -0.82;
    const scrollEnd = 1.08;
    let receiptScroll = scrollStart;
    let scrollVelocity = 0;
    let lastTime = performance.now();
    let externalScrollProgress = 0;
    let smoothScrollProgress = 0;
    let hasExternalScrollProgress = false;

    const updatePointer = (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      updatePointerFromClient(event.clientX - rect.left, event.clientY - rect.top);
    };

    const updatePointerFromClient = (clientX, clientY) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = (clientX / rect.width) * 2 - 1;
      pointer.y = -(clientY / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObject(paper, false)[0];
      if (hit && hit.uv) {
        isHovering = true;
        targetUv.copy(hit.uv);
        targetLift.copy(hit.point);
        targetLift.z += isDown ? 1.18 : 0.62;
      } else {
        isHovering = false;
      }
    };

    renderer.domElement.addEventListener("pointermove", updatePointer);
    renderer.domElement.addEventListener("pointerdown", (e) => { isDown = true; updatePointer(e); });
    window.addEventListener("pointerup", () => { isDown = false; });
    renderer.domElement.addEventListener("wheel", (e) => {
      scrollImpulse += THREE.MathUtils.clamp(e.deltaY * -0.00065, -0.55, 0.55);
      scrollVelocity += THREE.MathUtils.clamp(e.deltaY * 0.00020, -0.16, 0.16);
    }, { passive: true });

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "receipt-scroll-progress") return;

      hasExternalScrollProgress = true;
      externalScrollProgress = THREE.MathUtils.clamp(Number(event.data.progress) || 0, 0, 1);
    });

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "receipt-pointer") return;

      if (event.data.active) {
        updatePointerFromClient(Number(event.data.x) || 0, Number(event.data.y) || 0);
      } else {
        isHovering = false;
      }
    });

    function solveConstraint(con) {
      const p1 = con.a;
      const p2 = con.b;
      const delta = p2.pos.clone().sub(p1.pos);
      const d = delta.length() || 0.0001;
      const diff = (d - con.dist) / d;
      const invSum = p1.invMass + p2.invMass;
      if (invSum === 0) return;
      const correction = delta.multiplyScalar(diff * con.stiffness);
      if (p1.invMass > 0) p1.pos.addScaledVector(correction, p1.invMass / invSum);
      if (p2.invMass > 0) p2.pos.addScaledVector(correction, -p2.invMass / invSum);
    }

    function applyForces(time) {
      hoverAmount += ((isHovering ? 1 : 0) - hoverAmount) * 0.08;
      scrollImpulse *= 0.90;
      scrollOffset = THREE.MathUtils.clamp(scrollOffset + scrollImpulse, -0.95, 0.95) * 0.985;
      smoothUv.lerp(targetUv, 0.14);
      liftPoint.lerp(targetLift, 0.13);

      const t = time * 0.001;
      for (const p of particles) {
        const v = p.v;
        const u = p.u;
        const sag = Math.sin(v * Math.PI) * 0.004;
        p.addForce(new THREE.Vector3(0, -0.00016 - sag * 0.35, 0.0014));

        const lowerFirmForce = 1.0 - 0.84 * smoothstep(0.42, 1.0, v);
        const scrollWave = Math.sin(v * Math.PI * 3.0 + scrollOffset * 5.4) * scrollImpulse * 0.008 * lowerFirmForce;
        p.addForce(new THREE.Vector3(scrollWave * (0.35 + v * 0.35), scrollImpulse * 0.007 * (v - 0.18) * lowerFirmForce, Math.abs(scrollImpulse) * 0.030 * Math.sin(v * Math.PI) * lowerFirmForce));

        const rest = p.base.clone();
        const lowerFirm = 1.0 - 0.86 * smoothstep(0.42, 1.0, v);
        rest.z += Math.sin(t * 1.2 + v * 4.2) * 0.0035 * Math.sin(v * Math.PI) * lowerFirm;
        rest.z += p.crease * 0.24 * Math.sin(v * Math.PI) * lowerFirm;
        rest.x += Math.sin(t * 0.85 + v * 8.0) * 0.0018 * Math.sin(v * Math.PI) * lowerFirm;
        const bottomAnchor = smoothstep(0.72, 1.0, v);
        const restore = rest.sub(p.pos).multiplyScalar(0.0052 + v * 0.0068 + bottomAnchor * 0.018);
        p.addForce(restore);

        const du = u - smoothUv.x;
        const dv = (1 - v) - smoothUv.y;
        const dist2 = du * du * 1.9 + dv * dv;
        const lowerStiffness = THREE.MathUtils.lerp(1.0, 0.18, smoothstep(0.42, 1.0, v));
        const local = Math.exp(-dist2 * 30.0) * hoverAmount * lowerStiffness;
        if (local > 0.003) {
          const desired = liftPoint.clone();
          const paperLocalX = (u - 0.5) * paperW;
          const paperLocalY = (0.5 - v) * paperH;
          desired.x = paperLocalX * 0.28 + liftPoint.x * 0.72;
          desired.y = paperLocalY * 0.28 + liftPoint.y * 0.72;
          desired.z += local * (isDown ? 0.26 : 0.13);
          const magnet = desired.sub(p.pos).multiplyScalar((isDown ? 0.010 : 0.006) * local);
          p.addForce(magnet);

          // Crease memory: pressure and curvature slowly write a small permanent fold into the paper.
          const foldSign = Math.sign(du || 0.001);
          p.creaseTarget += foldSign * local * (isDown ? 0.0032 : 0.0014);
        }

        // Scrolling also writes subtle horizontal crease bands, similar to thermal receipt paper being handled.
        p.creaseTarget += Math.sin(v * Math.PI * 8.0 + scrollOffset * 2.2) * Math.abs(scrollImpulse) * 0.0016 * Math.sin(v * Math.PI);

        p.creaseTarget = THREE.MathUtils.clamp(p.creaseTarget, -0.085, 0.085);
        p.crease += (p.creaseTarget - p.crease) * 0.018;
        p.creaseTarget *= 0.9994;

        const creaseZ = p.crease * Math.sin(v * Math.PI);
        p.addForce(new THREE.Vector3(0, 0, creaseZ * 0.004 * lowerFirmForce));

        const sideCurl = (Math.pow(Math.abs(u - 0.5) * 2.0, 2.4)) * 0.0025 * Math.sin(t + v * 2.8) * lowerFirmForce;
        p.addForce(new THREE.Vector3(0, 0, sideCurl));
      }
    }

    function satisfyBounds() {
      for (const p of particles) p.pos.z = THREE.MathUtils.clamp(p.pos.z, -0.18, isDown ? 0.52 : 0.40);
    }

    function updateGeometry() {
      const pos = geo.attributes.position.array;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        pos[i * 3] = p.pos.x;
        pos[i * 3 + 1] = p.pos.y;
        pos[i * 3 + 2] = p.pos.z;
      }
      geo.attributes.position.needsUpdate = true;
      geo.computeVertexNormals();
    }

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      const time = now * 0.001;

      receiptGroup.rotation.x = Math.sin(time * 0.62) * 0.018 - 0.06;
      receiptGroup.rotation.y = Math.sin(time * 0.49) * 0.035 + pointer.x * 0.035;
      scrollVelocity *= 0.82;
      if (hasExternalScrollProgress) {
        smoothScrollProgress += (externalScrollProgress - smoothScrollProgress) * 0.12;
      } else {
        receiptScroll = THREE.MathUtils.clamp(receiptScroll + scrollVelocity, scrollStart, scrollEnd);
      }
      const viewportHalfY = Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)) * camera.position.z;
      const receiptProgress = hasExternalScrollProgress ? smoothScrollProgress * 0.52 : (receiptScroll - scrollStart) / (scrollEnd - scrollStart);
      const travelY = THREE.MathUtils.lerp(viewportHalfY - paperH * 0.5 - 0.24, paperH * 0.5 - viewportHalfY + 0.24, receiptProgress);
      receiptGroup.position.y = travelY + Math.sin(time * 0.9) * 0.035;
      receiptGroup.position.z = Math.sin(time * 0.7) * 0.055;

      applyForces(now);
      const dtSq = Math.min(dt * dt * 4000, 1.1);
      for (const p of particles) p.integrate(dtSq, 0.90);
      for (let i = 0; i < 16; i++) {
        for (const con of constraints) solveConstraint(con);
        satisfyBounds();
      }
      updateGeometry();

      paperMaterial.uniforms.uTime.value = time;
      onReceiptAmount += ((isHovering ? 1 : 0) - onReceiptAmount) * 0.055;
      paperMaterial.uniforms.uHover.value = hoverAmount;
      paperMaterial.uniforms.uOnReceipt.value = onReceiptAmount;
      if (typeof backMaterial !== "undefined") {
        backMaterial.uniforms.uHover.value = hoverAmount;
        backMaterial.uniforms.uOnReceipt.value = onReceiptAmount;
        backMaterial.uniforms.uMouseUv.value.copy(smoothUv);
      }
      paperMaterial.uniforms.uMouseUv.value.copy(smoothUv);
      bgMaterial.uniforms.uTime.value = time;
      bgMaterial.uniforms.uHover.value = hoverAmount;
      bgMaterial.uniforms.uOnReceipt.value = onReceiptAmount;
      bgMaterial.uniforms.uSpot.value.set((pointer.x + 1) * 0.5, (pointer.y + 1) * 0.5);
      glowMaterial.uniforms.uAlpha.value = hoverAmount * 0.78;
      cursorLight.intensity = hoverAmount * 0.92;
      cursorLight.position.copy(liftPoint).add(new THREE.Vector3(0, 0, 0.65));
      glow.position.copy(liftPoint).add(new THREE.Vector3(0, 0, 0.12));
      const glowCircleScale = 1.12 + Math.sin(time * 1.7) * 0.024 + hoverAmount * 0.21;
      glow.scale.set(glowCircleScale, glowCircleScale, 1);

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    window.addEventListener("resize", () => {
      width = host.clientWidth || window.innerWidth;
      height = host.clientHeight || window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      bgMaterial.uniforms.uAspect.value = width / height;
    });
  </script>
</body>
</html>
